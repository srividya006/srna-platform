version: "3.9"

services:
  backend:
    build: .
    container_name: srna_backend
    ports:
      - "8080:8080"
    volumes:
      - ./data:/app/data
    restart: unless-stopped

  frontend:
    image: python:3.10-slim
    container_name: srna_frontend
    working_dir: /app
    volumes:
      - ./streamlit_app:/app
    command: >
      sh -c "pip install streamlit requests &&
             streamlit run app.py --server.port=8501 --server.address=0.0.0.0"
    ports:
      - "8501:8501"
    depends_on:
      - backend
